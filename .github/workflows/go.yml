name: Go CI

# Ce workflow se déclenche quand tu pousses du code sur la branche main
# ou quand tu crées une Pull Request vers main.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Le serveur virtuel sur lequel les tests vont tourner
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub récupère ton code
    - name: Checkout du code
      uses: actions/checkout@v4

    # 2. GitHub installe l'environnement Go
    - name: Configuration de Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21' # Assure-toi que cela correspond à la version de ton go.mod

    # 3. Téléchargement des dépendances (yaml.v3, hclwrite, testify)
    - name: Installation des dépendances
      run: go mod download

    # 4. Vérification que le code compile bien
    - name: Build
      run: go build -v ./...

    # 5. Exécution de tous tes tests unitaires (C'est l'étape la plus importante !)
    - name: Tests Unitaires
      run: go test -v ./...

    - name: Vérification de la syntaxe HCL
      run: terraform fmt -check output.hcl