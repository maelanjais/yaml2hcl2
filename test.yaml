# 1. Métadonnées et types primitifs
infrastructure_id: "infra-prod-2024"
deprecated: false
scaling_factor: 1.25
max_retries: 5
api_endpoint: null

# 2. Profondeur de récursion (Niveau 5+)
architecture:
  couche_1:
    couche_2:
      couche_3:
        couche_4:
          couche_5:
            identifiant: "profondeur-maximale"
            valide: true

# 3. Collections hétérogènes (Tuples mixtes)
# Test de la capacité à gérer des types différents dans une même liste
donnees_mixtes:
  - "chaine"
  - 100
  - 45.5
  - false
  - { sous_objet: "valeur" }
  - [1, 2, 3]

# 4. Structures vides et limites
cas_limites:
  liste_vide: []
  objet_vide: {}
  chaine_vide: ""
  zeros: 0

# 5. Liste massive d'objets (Stress test d'itération)
clusters_regionaux:
  - nom: "europe-west"
    zones: ["a", "b", "c"]
    noeuds: 12
    metadata:
      env: "prod"
      cost_center: 1024
  - nom: "us-east"
    zones: ["a"]
    noeuds: 4
    metadata:
      env: "dev"
      cost_center: 512

# 6. Caractères spéciaux et Clés complexes
# Test de la gestion des identifiants par hclwrite
"cle avec espaces": "valeur"
"identifiant-avec-tirets": 10
"clé_accentuée": "test"
"123_commence_par_chiffre": true

# 7. Structure de sécurité imbriquée
politiques_securite:
  entrants:
    - priorite: 100
      action: "ALLOW"
      regles:
        ports: [80, 443]
        protocoles: ["TCP", "UDP"]
    - priorite: 200
      action: "DENY"
      regles:
        ports: [0, 65535]
        protocoles: ["*"]