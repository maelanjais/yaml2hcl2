# ===================================================================
# Fichier de test de stress pour convertisseur YAML -> HCL2
# ===================================================================

titre_projet: "infrastructure-globale"
version_config: 4.2
mode_strict: true
valeur_nulle: null
chaine_vide: ""

# 1. Dictionnaire contenant des primitives
parametres_globaux:
  timeout_secondes: 30
  taux_erreurs_max: 0.05
  region_principale: "eu-west-3"
  multi_zones: true

# 2. Listes et tuples (Homogènes et Hétérogènes)
serveurs_dns:
  - "1.1.1.1"
  - "8.8.8.8"
ports_ouverts: [80, 443, 22]
tuple_de_stress: ["chaine", 42, 3.14, false]

# 3. Structures vides (Cas limites)
liste_vide: []
objet_vide: {}

# 4. Imbrication profonde (Objets dans Objets)
cluster_kubernetes:
  nom: "k8s-prod"
  version: "1.28.2"
  haute_disponibilite: true
  nœuds:
    controle:
      quantite: 3
      type_instance: "t3.medium"
      labels:
        role: "master"
        environnement: "production"
    travailleurs:
      quantite_min: 5
      quantite_max: 20
      type_instance: "m5.large"
      labels:
        role: "worker"
        gpu_accelere: false

# 5. Listes d'objets (Très fréquent en infrastructure)
reseaux_virtuels:
  - nom: "vpc-frontend"
    cidr: "10.0.0.0/16"
    actif: true
    sous_reseaux:
      - nom: "subnet-public-1"
        cidr: "10.0.1.0/24"
        passerelle: "10.0.1.1"
      - nom: "subnet-public-2"
        cidr: "10.0.2.0/24"
        passerelle: "10.0.2.1"
  - nom: "vpc-backend"
    cidr: "10.1.0.0/16"
    actif: true
    sous_reseaux:
      - nom: "subnet-prive-1"
        cidr: "10.1.1.0/24"
        passerelle: null
  - nom: "vpc-archive"
    cidr: "192.168.0.0/16"
    actif: false
    sous_reseaux: []

# 6. Mélange final (Dictionnaire contenant liste contenant objet contenant tuple)
politiques_securite:
  regles_pare_feu:
    - nom: "autoriser-http"
      priorite: 100
      action: "allow"
      sources: ["0.0.0.0/0"]
      meta_donnees:
        audite: true
        tags: ["web", 80, true]
    - nom: "bloquer-tout"
      priorite: 999
      action: "deny"
      sources: ["0.0.0.0/0"]
      meta_donnees: {}